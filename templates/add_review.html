<!DOCTYPE html>
<html>
<head>
    <title>Add Review</title>
    <style>
        body { background:#0f172a; color:white; font-family:Arial; text-align:center;}
        form { background:#1e293b; padding:20px; margin:50px auto; width:300px; border-radius:10px;}
        input, textarea { width:90%; margin:10px; padding:8px;}
        button { background:#3b82f6; color:white; padding:10px; border:none;}
    </style>
</head>
<body>

<h1>Add Review ⭐</h1>

<form method="POST">
    <input type="text" name="movie_id" placeholder="Movie ID" required><br>
    <input type="text" name="user_id" placeholder="User ID" required><br>
    <input type="number" name="rating" placeholder="Rating (1-5)" required><br>
    <textarea name="comment" placeholder="Your Comment"></textarea><br>
    <button type="submit">Submit</button>
</form>

</body>
</html>
