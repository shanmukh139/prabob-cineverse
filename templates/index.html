<!DOCTYPE html>
<html>
<head>
    <title>PraBob Cineverse</title>
    <style>
        body { background:#0f172a; color:white; font-family:Arial; margin:0;}
        .header { padding:20px; background:#1e293b; display:flex; justify-content:space-between;}
        .btn { padding:10px 15px; background:#3b82f6; color:white; text-decoration:none; border-radius:5px;}
        .container { display:flex; gap:20px; padding:20px;}
        .card { background:#1e293b; padding:20px; border-radius:10px; width:30%;}
    </style>
</head>
<body>

<div class="header">
    <h1>🎬 PraBob Cineverse Dashboard</h1>
    <div>
        <a href="/movies" class="btn">View Movies</a>
        <a href="/add_review" class="btn">Add Review</a>
    </div>
</div>

<div class="container">
    <div class="card"><h2>Total Movies</h2><p>Available in database</p></div>
    <div class="card"><h2>Reviews</h2><p>User feedback</p></div>
    <div class="card"><h2>Explore</h2><p>Discover movies</p></div>
</div>

</body>
</html>
